services:
  admin:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: https://api.ventatalk.com
    restart: always
    ports:
      - "3002:3000"
    mem_limit: 1g
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
